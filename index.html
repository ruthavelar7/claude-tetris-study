<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section theme-toggle">
          <span class="label">MODO CLARO</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" aria-label="Cambiar entre modo claro y oscuro" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd><kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd><kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p class="overlay-title start-title">TETRIS</p>
        <div class="records-container" id="records-start"></div>
        <div class="start-settings">
          <div class="setting-row">
            <span class="label">NIVEL INICIAL</span>
            <div class="level-picker" id="level-picker-start"></div>
          </div>
          <div class="setting-row">
            <span class="label">SKIN</span>
            <div class="skin-picker" id="skin-picker-start"></div>
          </div>
        </div>
        <div class="overlay-actions">
          <button id="start-btn" class="btn-primary">JUGAR</button>
          <button id="reset-records-btn" class="btn-secondary">Resetear récords</button>
        </div>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title">PAUSA</p>
        <div id="controls-panel" class="controls-panel hidden">
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd><kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída rápida</li>
            <li><kbd>P</kbd><kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
        <div class="setting-row">
          <span class="label">NIVEL INICIAL (próxima partida)</span>
          <div class="level-picker" id="level-picker-pause"></div>
        </div>
        <div class="overlay-actions">
          <button id="resume-btn" class="btn-primary">Reanudar</button>
          <button id="restart-btn" class="btn-secondary">Reiniciar</button>
          <button id="controls-btn" class="btn-secondary">Ver controles</button>
        </div>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title">GAME OVER</p>
        <p id="gameover-score"></p>
        <div id="name-entry" class="name-entry hidden">
          <p class="entry-label">¡Entraste al Top 5!</p>
          <div class="name-input-row">
            <input type="text" id="player-name" placeholder="Tu nombre" maxlength="12" autocomplete="off" />
            <button id="save-score-btn" class="btn-primary">Guardar</button>
          </div>
        </div>
        <div class="records-container" id="records-gameover"></div>
        <div class="overlay-actions">
          <button id="gameover-restart-btn" class="btn-primary">Reiniciar</button>
          <button id="goto-start-btn" class="btn-secondary">Menú principal</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
